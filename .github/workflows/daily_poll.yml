name: Daily Telegram Poll

on:
  schedule:
    # 14:30 UTC is exactly 20:00 (8:00 PM) IST
    - cron: '30 14 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  send_poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state.json back to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Telegram Bot Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Commit and push updated state
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.json
          # Only commit if the state has actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update poll state" && git push)
